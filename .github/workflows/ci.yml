name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build OpenCAE Core packages
        run: |
          pnpm --filter @opencae/core build
          pnpm --filter @opencae/examples build
          pnpm --filter @opencae/solver-cpu build
          pnpm --filter @opencae/solver-wasm build
          pnpm --filter @opencae/solver-webgpu build
          pnpm --filter @opencae/viewer build

      - name: Test OpenCAE Core packages
        run: pnpm --filter "./packages/*" --if-present test

      - name: Verify Cloudflare config
        run: node scripts/verify-cloudflare-config.mjs

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build Cloudflare production bundle
        run: pnpm build:cloudflare

      - name: Enforce web bundle budget
        run: pnpm --filter @opencae/web check:bundle
